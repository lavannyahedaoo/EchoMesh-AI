# ==============================================================================
# AWS Containerized Deployment Configuration (ECS / ECR)
# ==============================================================================
version: '3.8'

services:
  # Production FastAPI Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/echomesh-backend:latest
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - BEDROCK_REASONING_MODEL=anthropic.claude-3-5-sonnet-20240620-v1:0
      - BEDROCK_EMBEDDING_MODEL=amazon.titan-embed-text-v2:0
      - COCKROACH_HOST=${COCKROACH_HOST}
      - COCKROACH_PORT=26257
      - COCKROACH_USER=${COCKROACH_USER}
      - COCKROACH_PASSWORD=${COCKROACH_PASSWORD}
      - COCKROACH_DB=${COCKROACH_DB}

  # Production Next.js Frontend Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/echomesh-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://echomesh-backend:8000/api/v1 # Map to private virtual link or ALB URL in production
    depends_on:
      - backend
